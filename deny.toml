# cargo-deny configuration — PlausiDen Atrium (unified egui desktop
# frontend hosting Tidy, Purge, disk analyzers).
#
# Uniform PlausiDen policy (authored 2026-04-19, Claude 3):
# - vulnerability=deny, unmaintained/unsound/yanked=warn.
# - deny unlicensed + copyleft; allow permissive set.
# - Every dep must come from crates.io.
# - rustls-first posture — no openssl / native-tls / curl / git2.
#
# Note: Atrium uses egui via `glow` backend on X11/Wayland. If a real
# hardware-accelerated backend is added, check its license surface.

[advisories]
version = 2
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "Zlib",
    # egui ecosystem commonly pulls in zlib-acknowledgement / OFL-1.1
    # for bundled fonts. Add on first real encounter, not speculatively.
]
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[bans]
multiple-versions = "warn"
deny = [
    { name = "openssl-sys" },
    { name = "openssl" },
    { name = "native-tls" },
    { name = "git2" },
    { name = "curl" },
    { name = "curl-sys" },
]
